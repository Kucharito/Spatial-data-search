<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geo Search Project</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Spatial Database Demo</p>
        <h1>Geo Search Project</h1>
        <p class="subtitle">
          Jednoducha mapa nad FastAPI a PostGIS pre hladanie objektov v okoli Ostravy.
        </p>
      </div>
      <div class="status-card">
        <div><strong>Backend:</strong> <span id="backend-status">checking...</span></div>
        <div><strong>Selected point:</strong> <span id="selected-coords">none</span></div>
      </div>
    </header>

    <section class="controls">
      <label>
        Category
        <select id="category-select">
          <option value="">All categories</option>
        </select>
      </label>

      <label>
        Nearest count (k)
        <input id="k-input" type="number" min="1" max="20" value="5">
      </label>

      <label>
        Radius (m)
        <input id="radius-input" type="number" min="100" step="100" value="1000">
      </label>

      <div class="button-row">
        <button id="load-all-btn">Load all places</button>
        <button id="nearest-btn">Find nearest</button>
        <button id="radius-btn">Find within radius</button>
        <button id="polygon-btn">Demo polygon</button>
        <button id="clear-btn" class="secondary">Clear map</button>
      </div>
    </section>

    <section class="map-panel">
      <div id="map"></div>
    </section>

    <section class="results-panel">
      <div class="results-header">
        <h2>Results</h2>
        <span id="results-info">0 rows</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Address</th>
              <th>Distance (m)</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
